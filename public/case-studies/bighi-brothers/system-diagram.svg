<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none">
  <rect width="1000" height="500" fill="#fdf9f6"/>
  <text x="500" y="50" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#1c1b1a" text-anchor="middle" opacity="0.8">Three-Step Ritual System</text>
  
  <!-- Rupam -->
  <rect x="60" y="100" width="260" height="280" rx="16" fill="#fdf9f6"/>
  <rect x="70" y="110" width="240" height="200" rx="12" fill="#e8e2dc"/>
  <text x="190" y="220" font-family="Georgia, serif" font-size="14" fill="#1c1b1a" text-anchor="middle" opacity="0.6">High-contrast imagery</text>
  <text x="190" y="350" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1c1b1a" text-anchor="middle">Rupam</text>
  <text x="190" y="375" font-family="sans-serif" font-size="12" fill="#5a6372" text-anchor="middle">Outer — Emotional entry</text>
  
  <!-- Arrow 1 -->
  <path d="M330 240 L350 240" stroke="#5150b2" stroke-width="2" stroke-dasharray="4"/>
  <polygon points="355,240 345,235 345,245" fill="#5150b2"/>
  
  <!-- Gunam -->
  <rect x="370" y="100" width="260" height="280" rx="16" fill="#f7f3f0"/>
  <rect x="380" y="110" width="240" height="200" rx="12" fill="#fdf9f6"/>
  <text x="500" y="210" font-family="Georgia, serif" font-size="14" fill="#1c1b1a" text-anchor="middle" opacity="0.8">"Skincare today is</text>
  <text x="500" y="235" font-family="Georgia, serif" font-size="14" fill="#1c1b1a" text-anchor="middle" opacity="0.8">functional. But usage</text>
  <text x="500" y="260" font-family="Georgia, serif" font-size="14" fill="#1c1b1a" text-anchor="middle" opacity="0.8">is emotional."</text>
  <text x="500" y="350" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1c1b1a" text-anchor="middle">Gunam</text>
  <text x="500" y="375" font-family="sans-serif" font-size="12" fill="#5a6372" text-anchor="middle">Inner — Guided ritual</text>
  
  <!-- Arrow 2 -->
  <path d="M640 240 L660 240" stroke="#5150b2" stroke-width="2" stroke-dasharray="4"/>
  <polygon points="665,240 655,235 655,245" fill="#5150b2"/>
  
  <!-- Vayastya -->
  <rect x="680" y="100" width="260" height="280" rx="16" fill="#fdf9f6"/>
  <rect x="690" y="110" width="240" height="200" rx="12" fill="#ffffff"/>
  <rect x="760" y="180" width="100" height="40" rx="20" fill="url(#gradient)"/>
  <text x="810" y="206" font-family="sans-serif" font-size="12" fill="#fdf9f6" text-anchor="middle" letter-spacing="1">BEGIN RITUAL</text>
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5150b2"/>
      <stop offset="100%" style="stop-color:#6a69cd"/>
    </linearGradient>
  </defs>
  <text x="810" y="350" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1c1b1a" text-anchor="middle">Vayastya</text>
  <text x="810" y="375" font-family="sans-serif" font-size="12" fill="#5a6372" text-anchor="middle">Lasting — Clear decision</text>
</svg>
